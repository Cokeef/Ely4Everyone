name: Release Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-to-latest-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release artifacts
        run: ./gradlew --no-daemon clean build

      - name: Collect release jars
        run: |
          mkdir -p dist
          cp mod/build/libs/ely4everyone-mod-0.1.0-SNAPSHOT.jar dist/
          cp velocity-plugin/build/libs/ely4everyone-velocity-plugin-0.1.0-SNAPSHOT.jar dist/
          cp paper-plugin/build/libs/ely4everyone-paper-bridge-0.1.0-SNAPSHOT.jar dist/
          ls -lah dist

      - name: Resolve latest release tag
        id: latest_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName')"
          if [ -z "$latest_tag" ] || [ "$latest_tag" = "null" ]; then
            echo "No published release found to update" >&2
            exit 1
          fi
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Replace assets in latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.latest_release.outputs.tag }}" dist/* --clobber
